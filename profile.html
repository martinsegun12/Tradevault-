<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Trade Vault - Profile</title>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-storage-compat.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <nav class="navbar">
        <div class="logo" onclick="location.href='index.html'">Trade Vault</div>
        <div class="nav-links">
            <a href="dashboard.html">Log Trade</a>
            <a href="analytics.html">Analytics</a>
            <a href="propfirm.html">Prop Firm</a>
            <a href="profile.html" class="active">Profile</a>
            <button class="btn btn-outline" onclick="logout()">Logout</button>
        </div>
    </nav>

    <div class="container">
        <!-- Profile Card -->
        <div class="card">
            <div class="card-body" style="text-align: center;">
                <div class="profile-pic" id="profilePic" onclick="document.getElementById('fileInput').click()">
                    <i class="fas fa-user"></i>
                </div>
                <input type="file" id="fileInput" style="display:none" accept="image/*">
                <h2 id="userName">Trader</h2>
                <div class="rank-card" style="display: inline-block; margin-top: 0.5rem;">
                    <div id="rankName" style="font-weight: 600;">Beginner 1</div>
                    <div class="stars" id="starContainer"></div>
                    <div id="rankBadge" class="badge badge-info" style="margin-top: 0.5rem;">🌱 Bronze Seed</div>
                </div>
            </div>
        </div>

        <!-- Stats -->
        <div class="grid grid-2">
            <div class="card"><div class="card-header"><h3>📊 Trading Stats</h3></div><div class="card-body"><div><strong>Total Wins:</strong> <span id="totalWins">0</span></div><div><strong>Total Losses:</strong> <span id="totalLosses">0</span></div><div><strong>Current Streak:</strong> <span id="currentStreak">0</span></div><div><strong>Best Streak:</strong> <span id="bestStreak">0</span></div></div></div>
            <div class="card"><div class="card-header"><h3>🏆 Milestone Badges</h3></div><div class="card-body"><div id="badges" class="flex" style="display: flex; gap: 0.5rem; flex-wrap: wrap;"></div></div></div>
        </div>

        <!-- Export -->
        <div class="card"><div class="card-header"><h3><i class="fas fa-download"></i> Export Data</h3></div><div class="card-body"><button class="btn btn-primary" onclick="exportCSV()">Export to CSV</button><div id="exportMsg" style="margin-top: 0.5rem;"></div></div></div>
    </div>

    <script src="firebase-config.js"></script>
    <script>
        let currentUser = null;

        async function loadProfile() {
            let userDoc = await db.collection('users').doc(currentUser.uid).get();
            let data = userDoc.data();
            let totalWins = data?.totalWins || 0;
            let totalLosses = data?.totalLosses || 0;

            document.getElementById('userName').innerHTML = data?.name || currentUser.email;
            document.getElementById('totalWins').innerHTML = totalWins;
            document.getElementById('totalLosses').innerHTML = totalLosses;

            if (data?.profilePic) document.getElementById('profilePic').innerHTML = `<img src="${data.profilePic}">`;

            let rankInfo = getRankInfo(totalWins);
            document.getElementById('rankName').innerHTML = `${rankInfo.rank} ${rankInfo.stage} ${rankInfo.config.icon}`;
            document.getElementById('rankBadge').innerHTML = rankInfo.config.badge;
            let stars = document.getElementById('starContainer');
            stars.innerHTML = '';
            for (let i = 0; i < rankInfo.config.starsPerStage; i++) {
                let star = document.createElement('i');
                star.className = i < rankInfo.starsInStage ? 'fas fa-star star filled' : 'far fa-star star';
                stars.appendChild(star);
            }

            // Streaks
            let trades = await db.collection('trades').where('userId', '==', currentUser.uid).orderBy('date').get();
            let streak = 0, bestStreak = 0;
            for (let doc of trades.docs) {
                if (doc.data().result === 'win') { streak++; bestStreak = Math.max(bestStreak, streak); }
                else streak = 0;
            }
            document.getElementById('currentStreak').innerHTML = streak;
            document.getElementById('bestStreak').innerHTML = bestStreak;

            // Badges
            let badges = [];
            if (totalWins >= 10) badges.push('🏅 10 Wins');
            if (totalWins >= 50) badges.push('🎖️ 50 Wins');
            if (totalWins >= 100) badges.push('🏆 100 Wins');
            if (bestStreak >= 5) badges.push('🔥 5 Streak');
            if (bestStreak >= 10) badges.push('⚡ 10 Streak');
            document.getElementById('badges').innerHTML = badges.length ? badges.map(b => `<span class="badge badge-success">${b}</span>`).join('') : '<span class="badge">Log more trades to earn badges</span>';
        }

        document.getElementById('fileInput').addEventListener('change', async (e) => {
            let file = e.target.files[0];
            if (file) {
                let ref = storage.ref(`profiles/${currentUser.uid}`);
                await ref.put(file);
                let url = await ref.getDownloadURL();
                await db.collection('users').doc(currentUser.uid).update({ profilePic: url });
                document.getElementById('profilePic').innerHTML = `<img src="${url}">`;
                alert('Profile picture updated!');
            }
        });

        async function exportCSV() {
            let trades = await db.collection('trades').where('userId', '==', currentUser.uid).get();
            let csv = 'Date,Result,Strategy,Pips,PnL,R:R,Notes\n';
            trades.docs.forEach(d => { let t = d.data(); csv += `${new Date(t.date).toLocaleDateString()},${t.result},${t.strategy},${t.pips || 0},${t.pnl || 0},${t.rr || 0},"${(t.notes || '').replace(/"/g, '""')}"\n`; });
            let blob = new Blob([csv], { type: 'text/csv' });
            let link = document.createElement('a');
            link.href = URL.createObjectURL(blob);
            link.download = `tradevault_export.csv`;
            link.click();
            document.getElementById('exportMsg').innerHTML = '<div class="alert alert-success">✅ Export complete!</div>';
        }

        async function logout() { await auth.signOut(); window.location.href = 'index.html'; }

        auth.onAuthStateChanged(async (user) => {
            if (user) {
                currentUser = user;
                if (!await checkSubscription(user.uid)) window.location.href = 'pricing.html';
                else loadProfile();
            } else { window.location.href = 'index.html'; }
        });
        window.exportCSV = exportCSV; window.logout = logout;
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Trade Vault | Profile</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-storage-compat.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<body>
<div class="app">
    <div class="sidebar">
        <div class="logo">🏦 Trade Vault</div>
        <div class="profile-section" id="profileSection">
            <div class="profile-pic" id="profilePic"><i class="fas fa-user"></i></div>
            <h4 id="userName">Trader</h4>
        </div>
        <div class="rank-card" id="rankCard">
            <div class="rank-name" id="rankName">Beginner 1</div>
            <div class="stars" id="starContainer"></div>
            <div class="rank-badge" id="rankBadge">🌱 Bronze Seed</div>
        </div>
        <div class="nav-item" onclick="location.href='dashboard.html'">📝 Log Trade</div>
        <div class="nav-item" onclick="location.href='analytics.html'">📊 Analytics</div>
        <div class="nav-item" onclick="location.href='propfirm.html'">🎯 Prop Firm</div>
        <div class="nav-item active" onclick="location.href='profile.html'">👤 Profile</div>
        <div class="nav-item" onclick="signOut()">🚪 Sign Out</div>
    </div>
    
    <div class="main">
        <!-- Profile Card -->
        <div class="card">
            <div class="card-header">
                <h2><i class="fas fa-user-circle"></i> Your Profile</h2>
            </div>
            <div style="text-align: center;">
                <div class="profile-pic" id="profilePicLarge" style="width: 120px; height: 120px; margin: 0 auto 1rem; cursor: pointer;">
                    <i class="fas fa-user" style="font-size: 60px;"></i>
                </div>
                <input type="file" id="profileUpload" accept="image/*" style="display: none;">
                <button class="btn btn-secondary" onclick="document.getElementById('profileUpload').click()">Change Profile Picture</button>
            </div>
            
            <div class="form-group" style="margin-top: 2rem;">
                <label>Display Name</label>
                <input type="text" id="displayName" placeholder="Your name">
            </div>
            <div class="form-group">
                <label>Email</label>
                <input type="email" id="userEmail" readonly>
            </div>
            <div class="form-group">
                <label>Account Created</label>
                <input type="text" id="createdAt" readonly>
            </div>
            <button class="btn" onclick="updateProfile()"><i class="fas fa-save"></i> Save Changes</button>
            <div id="profileMessage" style="margin-top: 1rem;"></div>
        </div>
        
        <!-- Rank Progression -->
        <div class="card">
            <h3><i class="fas fa-chart-simple"></i> Rank Progression</h3>
            <div id="rankProgression"></div>
        </div>
        
        <!-- Milestone Badges -->
        <div class="card">
            <h3><i class="fas fa-medal"></i> Milestone Badges</h3>
            <div id="badgesContainer" class="flex" style="gap: 1rem; flex-wrap: wrap;"></div>
        </div>
        
        <!-- Trading Streaks -->
        <div class="card">
            <h3><i class="fas fa-fire"></i> Trading Streaks</h3>
            <div class="grid">
                <div class="stat-card">
                    <div class="stat-value" id="currentStreak">0</div>
                    <div class="stat-label">Current Win Streak</div>
                </div>
                <div class="stat-card">
                    <div class="stat-value" id="bestStreak">0</div>
                    <div class="stat-label">Best Win Streak</div>
                </div>
            </div>
        </div>
        
        <!-- Export Data -->
        <div class="card">
            <h3><i class="fas fa-download"></i> Export Your Data</h3>
            <div class="flex">
                <button class="btn" onclick="exportTradesCSV()"><i class="fas fa-file-csv"></i> Export to CSV</button>
                <button class="btn btn-secondary" onclick="exportBackup()"><i class="fas fa-cloud-upload-alt"></i> Create Backup</button>
            </div>
            <div id="exportMessage" style="margin-top: 1rem;"></div>
        </div>
        
        <!-- Subscription Status -->
        <div class="card">
            <h3><i class="fas fa-gem"></i> Subscription Status</h3>
            <div id="subscriptionStatus"></div>
            <button class="btn btn-secondary" onclick="location.href='index.html'">Upgrade to Lifetime</button>
        </div>
    </div>
</div>

<script src="firebase-config.js"></script>
<script>
    let currentUser = null;
    
    async function loadProfileData() {
        if (!currentUser) return;
        const userDoc = await db.collection('users').doc(currentUser.uid).get();
        const data = userDoc.data();
        
        document.getElementById('displayName').value = data?.name || currentUser.displayName || '';
        document.getElementById('userEmail').value = currentUser.email;
        document.getElementById('createdAt').value = data?.createdAt ? new Date(data.createdAt).toLocaleDateString() : 'N/A';
        
        if (data?.profilePic) {
            document.getElementById('profilePic').innerHTML = `<img src="${data.profilePic}">`;
            document.getElementById('profilePicLarge').innerHTML = `<img src="${data.profilePic}">`;
        }
        
        // Rank progression
        const totalWins = data?.totalWins || 0;
        const ranks = ['Beginner', 'Intermediate', 'Advanced', 'Elite', 'Master', 'Elite Master'];
        let progressionHtml = '<div class="flex" style="justify-content: space-between;">';
        let accumulated = 0;
        for (let rank of ranks) {
            const config = RANK_SYSTEM[rank];
            const needed = config.stages * config.starsPerStage;
            let status = '';
            if (totalWins >= accumulated + needed) {
                status = '✅ Completed';
            } else if (totalWins >= accumulated) {
                const progress = totalWins - accumulated;
                const percent = (progress / needed * 100).toFixed(0);
                status = `🔄 ${percent}%`;
            } else {
                status = '🔒 Locked';
            }
            progressionHtml += `<div style="text-align: center;"><strong>${rank}</strong><br><small>${status}</small></div>`;
            accumulated += needed;
        }
        progressionHtml += '</div>';
        document.getElementById('rankProgression').innerHTML = progressionHtml;
        
        // Badges
        const badges = [];
        if (totalWins >= 10) badges.push('🏅 10 Wins');
        if (totalWins >= 50) badges.push('🎖️ 50 Wins');
        if (totalWins >= 100) badges.push('🏆 100 Wins');
        if (totalWins >= 500) badges.push('👑 Elite Trader');
        
        const trades = await db.collection('trades').where('userId', '==', currentUser.uid).orderBy('createdAt').get();
        let currentStreak = 0, bestStreak = 0;
        for (let doc of trades.docs) {
            if (doc.data().result === 'win') {
                currentStreak++;
                bestStreak = Math.max(bestStreak, currentStreak);
            } else {
                currentStreak = 0;
            }
        }
        if (currentStreak >= 5) badges.push('🔥 5 in a row');
        if (bestStreak >= 10) badges.push('⚡ 10 Streak Master');
        if (bestStreak >= 20) badges.push('💎 20 Streak Legend');
        
        document.getElementById('currentStreak').innerHTML = currentStreak;
        document.getElementById('bestStreak').innerHTML = bestStreak;
        
        const badgesContainer = document.getElementById('badgesContainer');
        if (badges.length) {
            badgesContainer.innerHTML = badges.map(b => `<span class="badge badge-info" style="font-size: 1rem; padding: 8px 16px;">${b}</span>`).join('');
        } else {
            badgesContainer.innerHTML = '<span>Keep trading to earn badges!</span>';
        }
        
        // Subscription
        const isSubscribed = await checkSubscription(currentUser.uid);
        const trialEnd = data?.trialEnd ? new Date(data.trialEnd) : null;
        if (isSubscribed) {
            if (data?.paidUntil) {
                document.getElementById('subscriptionStatus').innerHTML = '<div class="alert alert-success">✅ Lifetime Access Active</div>';
            } else if (trialEnd && trialEnd > new Date()) {
                const daysLeft = Math.ceil((trialEnd - new Date()) / (1000 * 60 * 60 * 24));
                document.getElementById('subscriptionStatus').innerHTML = `<div class="alert alert-warning">🎁 Trial Active: ${daysLeft} days remaining</div>`;
            }
        } else {
            document.getElementById('subscriptionStatus').innerHTML = '<div class="alert alert-danger">⏰ Trial Expired. Please upgrade.</div>';
        }
    }
    
    document.getElementById('profilePicLarge').addEventListener('click', () => {
        document.getElementById('profileUpload').click();
    });
    
    document.getElementById('profileUpload').addEventListener('change', async (e) => {
        const file = e.target.files[0];
        if (file && currentUser) {
            const ref = storage.ref(`profiles/${currentUser.uid}`);
            await ref.put(file);
            const url = await ref.getDownloadURL();
            await db.collection('users').doc(currentUser.uid).update({ profilePic: url });
            document.getElementById('profilePic').innerHTML = `<img src="${url}">`;
            document.getElementById('profilePicLarge').innerHTML = `<img src="${url}">`;
            document.getElementById('profileMessage').innerHTML = '<div class="alert alert-success">✅ Profile picture updated!</div>';
            gsap.from('#profilePicLarge', { scale: 1.2, duration: 0.3, ease: 'back.out' });
        }
    });
    
    async function updateProfile() {
        const newName = document.getElementById('displayName').value;
        if (newName && currentUser) {
            await currentUser.updateProfile({ displayName: newName });
            await db.collection('users').doc(currentUser.uid).update({ name: newName });
            document.getElementById('userName').innerHTML = newName;
            document.getElementById('profileMessage').innerHTML = '<div class="alert alert-success">✅ Profile updated!</div>';
            setTimeout(() => { document.getElementById('profileMessage').innerHTML = ''; }, 2000);
        }
    }
    
    async function exportTradesCSV() {
        const trades = await db.collection('trades').where('userId', '==', currentUser.uid).get();
        let csv = 'Date,Result,Strategy,Session,Emotion,Mistake,Pips,PnL,R:R,Notes\n';
        trades.docs.forEach(doc => {
            const t = doc.data();
            const date = t.createdAt?.toDate().toLocaleDateString() || 'N/A';
            csv += `"${date}","${t.result}","${t.strategy}","${t.session}","${t.emotion}","${t.mistake}",${t.pips || 0},${t.pnl || 0},${t.rr || 0},"${(t.condition || '').replace(/"/g, '""')}"\n`;
        });
        const blob = new Blob([csv], { type: 'text/csv' });
        const link = document.createElement('a');
        link.href = URL.createObjectURL(blob);
        link.download = `tradevault_${currentUser.uid}.csv`;
        link.click();
        document.getElementById('exportMessage').innerHTML = '<div class="alert alert-success">✅ Export complete!</div>';
    }
    
    async function exportBackup() {
        const trades = await db.collection('trades').where('userId', '==', currentUser.uid).get();
        const userDoc = await db.collection('users').doc(currentUser.uid).get();
        const backup = { user: userDoc.data(), trades: trades.docs.map(d => d.data()), exportedAt: new Date().toISOString() };
        const blob = new Blob([JSON.stringify(backup, null, 2)], { type: 'application/json' });
        const link = document.createElement('a');
        link.href = URL.createObjectURL(blob);
        link.download = `tradevault_backup_${currentUser.uid}.json`;
        link.click();
        document.getElementById('exportMessage').innerHTML = '<div class="alert alert-success">✅ Backup created!</div>';
    }
    
    async function loadRankDisplay() {
        const userDoc = await db.collection('users').doc(currentUser.uid).get();
        const totalWins = userDoc.data()?.totalWins || 0;
        const info = getRankInfo(totalWins);
        document.getElementById('rankName').innerHTML = `${info.rank} ${info.stage} ${info.config.icon}`;
        document.getElementById('rankBadge').innerHTML = info.config.badge;
        const container = document.getElementById('starContainer');
        container.innerHTML = '';
        for (let i = 0; i < info.config.starsPerStage; i++) {
            const star = document.createElement('i');
            star.className = `fa-star ${i < info.starsInStage ? 'fas star filled' : 'far star'}`;
            container.appendChild(star);
        }
    }
    
    function signOut() { auth.signOut(); window.location.href = 'index.html'; }
    
    auth.onAuthStateChanged(async (user) => {
        if (user) {
            currentUser = user;
            document.getElementById('userName').innerHTML = user.displayName || user.email;
            await loadRankDisplay();
            await loadProfileData();
        } else { window.location.href = 'index.html'; }
    });
    
    window.updateProfile = updateProfile;
    window.exportTradesCSV = exportTradesCSV;
    window.exportBackup = exportBackup;
    window.signOut = signOut;
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Trade Vault - Log Trade</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-storage-compat.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <nav class="navbar">
        <div class="logo" onclick="location.href='index.html'">Trade Vault</div>
        <div class="nav-links">
            <a href="dashboard.html" class="active">Log Trade</a>
            <a href="analytics.html">Analytics</a>
            <a href="propfirm.html">Prop Firm</a>
            <a href="profile.html">Profile</a>
            <button class="btn btn-outline" onclick="logout()">Logout</button>
        </div>
    </nav>

    <div class="container">
        <!-- Main Trade Form -->
        <div class="card">
            <div class="card-header"><h2><i class="fas fa-pen"></i> Log Trade</h2></div>
            <div class="card-body">
                <div class="grid grid-2">
                    <div>
                        <div class="form-group"><label>Entry Price</label><input type="number" id="entry" step="0.00001" placeholder="1.09500"></div>
                        <div class="form-group"><label>Exit Price</label><input type="number" id="exit" step="0.00001" placeholder="1.09800"></div>
                        <div class="form-group"><label>Lot Size</label><input type="number" id="lots" step="0.01" value="0.01"></div>
                    </div>
                    <div>
                        <div class="form-group"><label>Strategy</label><input type="text" id="strategy" placeholder="Breakout / Pullback"></div>
                        <div class="form-group"><label>Time Frame</label><select id="timeframe"><option>1m</option><option>5m</option><option>15m</option><option>1h</option><option>4h</option><option>1D</option></select></div>
                        <div class="form-group"><label>Emotion</label><select id="emotion"><option>Calm</option><option>Anxious</option><option>Overconfident</option><option>Fearful</option><option>Disciplined</option></select></div>
                    </div>
                </div>
                <div class="form-group"><label>Notes</label><textarea id="notes" rows="2" placeholder="Trade condition, setup quality, lesson learned..."></textarea></div>
                <div class="grid grid-2">
                    <div class="form-group"><label>Result</label><select id="result"><option value="win">✅ WIN (+1 star)</option><option value="loss">❌ LOSS (-1 star)</option></select></div>
                    <div class="form-group"><label>Risk:Reward</label><input type="number" id="rr" step="0.1" placeholder="2.5" value="1"></div>
                </div>
                <div class="form-group"><label>Chart Image</label><input type="file" id="tradeImage" accept="image/*"><div id="imagePreview" class="image-preview"></div></div>
                <button class="btn btn-primary" onclick="saveTrade()">Save Trade</button>
                <div id="tradeMessage" style="margin-top: 1rem;"></div>
            </div>
        </div>

        <!-- Position Sizing Tool -->
        <div class="card">
            <div class="card-header"><h3><i class="fas fa-calculator"></i> Position Sizing</h3></div>
            <div class="card-body">
                <div class="grid grid-3">
                    <input type="number" id="balance" placeholder="Account Balance" class="form-control">
                    <input type="number" id="riskPercent" placeholder="Risk %" class="form-control">
                    <input type="number" id="slPips" placeholder="Stop Loss (pips)" class="form-control">
                </div>
                <button class="btn btn-secondary" onclick="calcPosition()" style="margin-top: 0.5rem;">Calculate</button>
                <div id="positionResult" class="alert alert-info" style="margin-top: 0.75rem;"></div>
            </div>
        </div>

        <!-- Recent Trades -->
        <div class="card">
            <div class="card-header"><h3><i class="fas fa-history"></i> Recent Trades</h3></div>
            <div class="card-body">
                <div class="table-wrapper">
                    <table id="recentTable">
                        <thead><tr><th>Date</th><th>Result</th><th>Strategy</th><th>Pips</th><th>PnL</th></tr></thead>
                        <tbody id="recentBody"><tr><td colspan="5">Loading...</td></tr></tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>

    <script src="firebase-config.js"></script>
    <script>
        let currentUser = null;

        function calcPips() {
            let entry = parseFloat(document.getElementById('entry').value);
            let exit = parseFloat(document.getElementById('exit').value);
            let lots = parseFloat(document.getElementById('lots').value) || 0.01;
            if (entry && exit) {
                let pips = Math.abs((exit - entry) * 10000);
                let pnl = pips * lots * 10;
                document.getElementById('tradeMessage').innerHTML = `<small>${pips.toFixed(1)} pips = $${pnl.toFixed(2)}</small>`;
            }
        }

        function calcPosition() {
            let balance = parseFloat(document.getElementById('balance').value);
            let riskPct = parseFloat(document.getElementById('riskPercent').value);
            let slPips = parseFloat(document.getElementById('slPips').value);
            if (balance && riskPct && slPips) {
                let riskAmount = balance * (riskPct / 100);
                let lots = riskAmount / (slPips * 10);
                document.getElementById('positionResult').innerHTML = `<strong>Suggested Lot Size: ${lots.toFixed(2)}</strong> (Risk: $${riskAmount.toFixed(2)})`;
            }
        }

        document.getElementById('entry').addEventListener('input', calcPips);
        document.getElementById('exit').addEventListener('input', calcPips);
        document.getElementById('lots').addEventListener('input', calcPips);
        document.getElementById('tradeImage').addEventListener('change', function(e) {
            if (e.target.files[0]) {
                let reader = new FileReader();
                reader.onload = function(ev) { document.getElementById('imagePreview').innerHTML = `<img src="${ev.target.result}">`; };
                reader.readAsDataURL(e.target.files[0]);
            }
        });

        async function saveTrade() {
            let entry = parseFloat(document.getElementById('entry').value);
            let exit = parseFloat(document.getElementById('exit').value);
            let lots = parseFloat(document.getElementById('lots').value) || 0.01;
            let result = document.getElementById('result').value;
            let pips = Math.abs((exit - entry) * 10000);
            let pnl = pips * lots * 10;

            let trade = {
                userId: currentUser.uid, entry, exit, lots, pips, pnl, result,
                strategy: document.getElementById('strategy').value || 'Not specified',
                timeframe: document.getElementById('timeframe').value,
                emotion: document.getElementById('emotion').value,
                notes: document.getElementById('notes').value,
                rr: parseFloat(document.getElementById('rr').value) || 0,
                date: new Date().toISOString()
            };

            let file = document.getElementById('tradeImage').files[0];
            if (file) {
                let ref = storage.ref(`trades/${currentUser.uid}/${Date.now()}_${file.name}`);
                await ref.put(file);
                trade.imageUrl = await ref.getDownloadURL();
            }

            await db.collection('trades').add(trade);

            let userDoc = await db.collection('users').doc(currentUser.uid).get();
            let wins = userDoc.data()?.totalWins || 0;
            let losses = userDoc.data()?.totalLosses || 0;
            if (result === 'win') wins++;
            else losses++;
            await db.collection('users').doc(currentUser.uid).update({ totalWins: wins, totalLosses: losses });

            document.getElementById('tradeMessage').innerHTML = '<div class="alert alert-success">✅ Trade saved successfully!</div>';
            setTimeout(() => { document.getElementById('tradeMessage').innerHTML = ''; }, 2000);
            
            document.getElementById('entry').value = '';
            document.getElementById('exit').value = '';
            document.getElementById('notes').value = '';
            document.getElementById('tradeImage').value = '';
            document.getElementById('imagePreview').innerHTML = '';
            loadRecentTrades();
        }

        async function loadRecentTrades() {
            let trades = await db.collection('trades').where('userId', '==', currentUser.uid).orderBy('date', 'desc').limit(10).get();
            let tbody = document.getElementById('recentBody');
            if (trades.empty) { tbody.innerHTML = '<tr><td colspan="5">No trades yet</td></tr>'; return; }
            tbody.innerHTML = '';
            trades.forEach(doc => {
                let t = doc.data();
                tbody.innerHTML += `<tr><td>${new Date(t.date).toLocaleDateString()}</td><td><span class="badge ${t.result === 'win' ? 'badge-success' : 'badge-danger'}">${t.result}</span></td><td>${t.strategy}</td><td>${t.pips?.toFixed(1) || 0}</td><td>$${t.pnl?.toFixed(2) || 0}</td></tr>`;
            });
        }

        async function logout() { await auth.signOut(); window.location.href = 'index.html'; }

        auth.onAuthStateChanged(async (user) => {
            if (user) {
                currentUser = user;
                if (!await checkSubscription(user.uid)) window.location.href = 'pricing.html';
                else loadRecentTrades();
            } else { window.location.href = 'index.html'; }
        });

        window.saveTrade = saveTrade; window.calcPosition = calcPosition; window.logout = logout;
    </script>
</body>
</html>

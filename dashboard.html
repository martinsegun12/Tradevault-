<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Trade Vault | Log Trade</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-storage-compat.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<body>
<div class="app">
    <div class="sidebar">
        <div class="logo">🏦 Trade Vault</div>
        <div class="profile-section" id="profileSection">
            <div class="profile-pic" id="profilePic" onclick="document.getElementById('profileInput').click()">
                <i class="fas fa-user"></i>
            </div>
            <input type="file" id="profileInput" style="display:none" accept="image/*">
            <h4 id="userName">Trader</h4>
        </div>
        <div class="rank-card" id="rankCard">
            <div class="rank-name" id="rankName">Beginner 1</div>
            <div class="stars" id="starContainer"></div>
            <div class="rank-badge" id="rankBadge">🌱 Bronze Seed</div>
        </div>
        <div class="nav-item active" onclick="location.href='dashboard.html'">📝 Log Trade</div>
        <div class="nav-item" onclick="location.href='analytics.html'">📊 Analytics</div>
        <div class="nav-item" onclick="location.href='propfirm.html'">🎯 Prop Firm</div>
        <div class="nav-item" onclick="location.href='profile.html'">👤 Profile</div>
        <div class="nav-item" onclick="signOut()">🚪 Sign Out</div>
    </div>
    
    <div class="main">
        <!-- Trade Entry Form -->
        <div class="card">
            <div class="card-header">
                <h2><i class="fas fa-pen"></i> Log Your Trade</h2>
                <span id="liveDate"></span>
            </div>
            
            <div class="grid">
                <div>
                    <div class="form-group">
                        <label>📈 Entry Price</label>
                        <input type="number" id="entryPrice" step="0.00001" placeholder="1.09500">
                    </div>
                    <div class="form-group">
                        <label>📉 Exit Price</label>
                        <input type="number" id="exitPrice" step="0.00001" placeholder="1.09800">
                    </div>
                    <div class="form-group">
                        <label>📊 Lot Size</label>
                        <input type="number" id="lotSize" step="0.01" placeholder="0.01" value="0.01">
                    </div>
                    <div class="form-group">
                        <label>💵 Pips / PnL</label>
                        <input type="text" id="pnlDisplay" readonly placeholder="Auto-calculated">
                    </div>
                </div>
                <div>
                    <div class="form-group">
                        <label>🎯 Strategy</label>
                        <input type="text" id="strategy" placeholder="Breakout / Pullback / SMC">
                    </div>
                    <div class="form-group">
                        <label>⏱️ Time Frame</label>
                        <select id="timeframe">
                            <option>1m</option><option>5m</option><option>15m</option>
                            <option>1h</option><option>4h</option><option>1D</option><option>1W</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label>😊 Emotion</label>
                        <select id="emotion">
                            <option>Calm</option><option>Anxious</option><option>Overconfident</option>
                            <option>Fearful</option><option>Disciplined</option><option>Revenge</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label>⚠️ Mistake</label>
                        <select id="mistake">
                            <option>None</option><option>FOMO</option><option>Revenge Trade</option>
                            <option>Oversized Lot</option><option>No SL</option><option>Early Exit</option>
                        </select>
                    </div>
                </div>
            </div>
            
            <div class="form-group">
                <label>📝 Trade Condition / Notes</label>
                <textarea id="condition" rows="2" placeholder="What made you take this trade? Was it part of your plan?"></textarea>
            </div>
            
            <div class="form-group">
                <label>🖼️ Upload Chart Image</label>
                <input type="file" id="tradeImage" accept="image/*">
                <div id="imagePreview" style="margin-top: 10px;"></div>
            </div>
            
            <div class="flex">
                <div class="form-group" style="flex:1">
                    <label>✅ Win or ❌ Loss?</label>
                    <select id="tradeResult">
                        <option value="win">✅ WIN (+1 star)</option>
                        <option value="loss">❌ LOSS (-1 star)</option>
                    </select>
                </div>
                <div class="form-group" style="flex:1">
                    <label>💰 Risk:Reward (1:X)</label>
                    <input type="number" id="riskReward" step="0.1" placeholder="2.5" value="1">
                </div>
            </div>
            
            <div class="flex">
                <button class="btn" onclick="saveTrade()"><i class="fas fa-save"></i> Save Trade</button>
                <button class="btn btn-secondary" onclick="clearForm()"><i class="fas fa-eraser"></i> Clear</button>
            </div>
            <div id="tradeMessage" style="margin-top: 1rem;"></div>
        </div>
        
        <!-- R:R Calculator Card -->
        <div class="card">
            <h3><i class="fas fa-calculator"></i> Risk:Reward Calculator</h3>
            <div class="flex">
                <div class="form-group" style="flex:1">
                    <label>Risk Amount ($)</label>
                    <input type="number" id="calcRisk" placeholder="100">
                </div>
                <div class="form-group" style="flex:1">
                    <label>Reward Amount ($)</label>
                    <input type="number" id="calcReward" placeholder="300">
                </div>
                <button class="btn" onclick="calculateRR()" style="align-self: flex-end;">Calculate</button>
            </div>
            <div id="rrResult" class="alert alert-success" style="margin-top: 0.5rem;">R:R = --:1</div>
        </div>
        
        <!-- Position Sizing Card -->
        <div class="card">
            <h3><i class="fas fa-weight-hanging"></i> Position Sizing Tool</h3>
            <div class="flex">
                <div class="form-group" style="flex:1">
                    <label>Account Balance ($)</label>
                    <input type="number" id="accountBalance" placeholder="10000">
                </div>
                <div class="form-group" style="flex:1">
                    <label>Risk %</label>
                    <input type="number" id="riskPercent" placeholder="1" step="0.5">
                </div>
                <div class="form-group" style="flex:1">
                    <label>Stop Loss (pips)</label>
                    <input type="number" id="stopLossPips" placeholder="20">
                </div>
                <button class="btn" onclick="calculatePositionSize()" style="align-self: flex-end;">Calculate</button>
            </div>
            <div id="positionResult" class="alert alert-info" style="margin-top: 0.5rem;">Suggested Lot Size: --</div>
        </div>
        
        <!-- Recent Trades -->
        <div class="card">
            <h3><i class="fas fa-history"></i> Recent Trades</h3>
            <div class="table-container">
                <table id="recentTradesTable">
                    <thead>
                        <tr><th>Date</th><th>Result</th><th>Strategy</th><th>Pips</th><th>PnL</th><th>R:R</th></tr>
                    </thead>
                    <tbody id="recentTradesBody">
                        <tr><td colspan="6">Loading...</td></tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>
</div>

<script src="firebase-config.js"></script>
<script>
    let currentUser = null;
    
    // Auto-calculate Pips & PnL
    function calculatePips() {
        const entry = parseFloat(document.getElementById('entryPrice').value);
        const exit = parseFloat(document.getElementById('exitPrice').value);
        const lot = parseFloat(document.getElementById('lotSize').value) || 0.01;
        if (entry && exit) {
            const pips = Math.abs((exit - entry) * 10000);
            const pnl = pips * lot * 10;
            document.getElementById('pnlDisplay').value = `${pips.toFixed(1)} pips = $${pnl.toFixed(2)}`;
        }
    }
    
    document.getElementById('entryPrice').addEventListener('input', calculatePips);
    document.getElementById('exitPrice').addEventListener('input', calculatePips);
    document.getElementById('lotSize').addEventListener('input', calculatePips);
    
    // Image preview
    document.getElementById('tradeImage').addEventListener('change', function(e) {
        const file = e.target.files[0];
        if (file) {
            const reader = new FileReader();
            reader.onload = function(event) {
                document.getElementById('imagePreview').innerHTML = `<img src="${event.target.result}" style="max-width: 200px; border-radius: 12px;">`;
            };
            reader.readAsDataURL(file);
        }
    });
    
    async function saveTrade() {
        if (!currentUser) return alert('Please login');
        
        const entry = parseFloat(document.getElementById('entryPrice').value);
        const exit = parseFloat(document.getElementById('exitPrice').value);
        const lot = parseFloat(document.getElementById('lotSize').value) || 0.01;
        const result = document.getElementById('tradeResult').value;
        const rr = parseFloat(document.getElementById('riskReward').value) || 0;
        
        if (!entry || !exit) {
            document.getElementById('tradeMessage').innerHTML = '<div class="alert alert-danger">Please enter entry and exit prices</div>';
            return;
        }
        
        const pips = Math.abs((exit - entry) * 10000);
        const pnl = pips * lot * 10;
        
        const tradeData = {
            userId: currentUser.uid,
            entry, exit, lot, pips, pnl, result, rr,
            strategy: document.getElementById('strategy').value || 'Not specified',
            timeframe: document.getElementById('timeframe').value,
            emotion: document.getElementById('emotion').value,
            mistake: document.getElementById('mistake').value,
            condition: document.getElementById('condition').value,
            session: getTradingSession(),
            createdAt: firebase.firestore.FieldValue.serverTimestamp()
        };
        
        // Upload image
        const imageFile = document.getElementById('tradeImage').files[0];
        if (imageFile) {
            const storageRef = storage.ref(`trades/${currentUser.uid}/${Date.now()}_${imageFile.name}`);
            await storageRef.put(imageFile);
            tradeData.imageUrl = await storageRef.getDownloadURL();
        }
        
        await db.collection('trades').add(tradeData);
        
        // Update user stats and stars
        const userDoc = await db.collection('users').doc(currentUser.uid).get();
        let totalWins = userDoc.data()?.totalWins || 0;
        let totalLosses = userDoc.data()?.totalLosses || 0;
        let stars = userDoc.data()?.stars || 0;
        
        if (result === 'win') {
            totalWins++;
            stars++;
        } else {
            totalLosses++;
            stars = Math.max(0, stars - 1);
        }
        
        await db.collection('users').doc(currentUser.uid).update({ totalWins, totalLosses, stars });
        await updateRankDisplay(currentUser.uid, totalWins);
        
        document.getElementById('tradeMessage').innerHTML = `<div class="alert alert-success">✅ Trade saved! ${result === 'win' ? '+1 star' : '-1 star'}</div>`;
        gsap.from('#tradeMessage', { opacity: 0, y: -10, duration: 0.5 });
        
        clearForm();
        loadRecentTrades();
    }
    
    function getTradingSession() {
        const hour = new Date().getHours();
        if (hour < 12) return 'Asia/London';
        if (hour < 18) return 'London/NY';
        return 'NY/Asia';
    }
    
    function clearForm() {
        document.getElementById('entryPrice').value = '';
        document.getElementById('exitPrice').value = '';
        document.getElementById('lotSize').value = '0.01';
        document.getElementById('strategy').value = '';
        document.getElementById('condition').value = '';
        document.getElementById('tradeImage').value = '';
        document.getElementById('imagePreview').innerHTML = '';
        document.getElementById('pnlDisplay').value = '';
        document.getElementById('riskReward').value = '1';
    }
    
    function calculateRR() {
        const risk = parseFloat(document.getElementById('calcRisk').value);
        const reward = parseFloat(document.getElementById('calcReward').value);
        if (risk && reward && risk > 0) {
            const rr = (reward / risk).toFixed(2);
            document.getElementById('rrResult').innerHTML = `R:R = 1:${rr}`;
            gsap.from('#rrResult', { scale: 1.1, duration: 0.3, ease: 'back.out' });
        }
    }
    
    function calculatePositionSize() {
        const balance = parseFloat(document.getElementById('accountBalance').value);
        const riskPct = parseFloat(document.getElementById('riskPercent').value);
        const slPips = parseFloat(document.getElementById('stopLossPips').value);
        if (balance && riskPct && slPips && slPips > 0) {
            const riskAmount = balance * (riskPct / 100);
            const lotSize = riskAmount / (slPips * 10);
            document.getElementById('positionResult').innerHTML = `Suggested Lot Size: ${lotSize.toFixed(2)} lots (Risk: $${riskAmount.toFixed(2)})`;
        }
    }
    
    async function updateRankDisplay(userId, totalWins) {
        const info = getRankInfo(totalWins);
        document.getElementById('rankName').innerHTML = `${info.rank} ${info.stage} ${info.config.icon}`;
        document.getElementById('rankBadge').innerHTML = info.config.badge;
        document.getElementById('rankBadge').style.background = `${info.config.color}20`;
        
        const container = document.getElementById('starContainer');
        container.innerHTML = '';
        for (let i = 0; i < info.config.starsPerStage; i++) {
            const star = document.createElement('i');
            star.className = `fa-star ${i < info.starsInStage ? 'fas star filled' : 'far star'}`;
            star.style.fontSize = '20px';
            container.appendChild(star);
        }
        gsap.from('#rankCard', { scale: 0.95, duration: 0.3, ease: 'back.out' });
    }
    
    async function loadRecentTrades() {
        if (!currentUser) return;
        const trades = await db.collection('trades')
            .where('userId', '==', currentUser.uid)
            .orderBy('createdAt', 'desc')
            .limit(10)
            .get();
        
        const tbody = document.getElementById('recentTradesBody');
        if (trades.empty) {
            tbody.innerHTML = '<tr><td colspan="6">No trades yet. Log your first trade!</td></tr>';
            return;
        }
        
        tbody.innerHTML = '';
        trades.forEach(doc => {
            const t = doc.data();
            const date = t.createdAt?.toDate().toLocaleDateString() || 'Today';
            tbody.innerHTML += `
                <tr>
                    <td>${date}</td>
                    <td><span class="badge ${t.result === 'win' ? 'badge-success' : 'badge-danger'}">${t.result.toUpperCase()}</span></td>
                    <td>${t.strategy}</td>
                    <td>${t.pips?.toFixed(1) || 0}</td>
                    <td>$${t.pnl?.toFixed(2) || 0}</td>
                    <td>1:${t.rr || 0}</td>
                </tr>
            `;
        });
    }
    
    async function loadProfile() {
        if (!currentUser) return;
        const userDoc = await db.collection('users').doc(currentUser.uid).get();
        const data = userDoc.data();
        document.getElementById('userName').innerHTML = data?.name || currentUser.displayName || currentUser.email;
        if (data?.profilePic) {
            document.getElementById('profilePic').innerHTML = `<img src="${data.profilePic}">`;
        }
        await updateRankDisplay(currentUser.uid, data?.totalWins || 0);
    }
    
    document.getElementById('profileInput').addEventListener('change', async (e) => {
        const file = e.target.files[0];
        if (file && currentUser) {
            const ref = storage.ref(`profiles/${currentUser.uid}`);
            await ref.put(file);
            const url = await ref.getDownloadURL();
            await db.collection('users').doc(currentUser.uid).update({ profilePic: url });
            document.getElementById('profilePic').innerHTML = `<img src="${url}">`;
            gsap.from('#profilePic', { scale: 1.2, duration: 0.3, ease: 'back.out' });
        }
    });
    
    function signOut() { auth.signOut(); window.location.href = 'index.html'; }
    
    document.getElementById('liveDate').innerHTML = new Date().toLocaleDateString('en-US', { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' });
    
    auth.onAuthStateChanged(async (user) => {
        if (user) {
            currentUser = user;
            const hasSubscription = await checkSubscription(user.uid);
            if (!hasSubscription) {
                alert('Your trial has expired. Please pay ₦5,000 to continue.');
                window.location.href = 'index.html';
            }
            await loadProfile();
            await loadRecentTrades();
        } else {
            window.location.href = 'index.html';
        }
    });
    
    window.saveTrade = saveTrade;
    window.clearForm = clearForm;
    window.calculateRR = calculateRR;
    window.calculatePositionSize = calculatePositionSize;
    window.signOut = signOut;
</script>
</body>
</html>
